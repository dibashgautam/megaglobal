{% extends "base.html" %}
{% block title %}Dashboard{% endblock %}

{% block content %}

<div class="container py-5">
    <h2 class="mb-4 fw-bold">Mega Sewa Dashboard</h2>

    <div class="row g-4">

        <div class="col-md-4">
            <div class="card shadow border-0 p-4 text-center">
                <h5>Total Categories</h5>
                <h2 class="fw-bold text-danger">{{ total_categories }}</h2>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow border-0 p-4 text-center">
                <h5>Total Products</h5>
                <h2 class="fw-bold text-danger">{{ total_products }}</h2>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow border-0 p-4 text-center">
                <h5>Total Sliders</h5>
                <h2 class="fw-bold text-danger">{{ total_sliders }}</h2>
            </div>
        </div>

    </div>

    <div class="mt-5">
        <a href="/admin/" class="btn btn-dark">Go to Admin Panel</a>
    </div>

</div>

{% endblock %}
